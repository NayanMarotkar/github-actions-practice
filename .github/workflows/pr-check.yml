name: Pr-check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: print branch name
        run: |
          echo "PR check running for branch: ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
