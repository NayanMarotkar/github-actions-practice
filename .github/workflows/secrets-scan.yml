name: secrets scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: run git leaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github actions provides this token by default, it can be used to authenticate with the GitHub API and perform actions on behalf of the workflow. In this case, it's used to allow the gitleaks action to access the repository and scan for secrets.