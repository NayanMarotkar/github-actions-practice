name: docker lint   # scan the docker file for cve issue

on:
    workflow_call:

jobs:
    ceck-dockerfile:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: validate dockerfile
              uses:  hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: Dockerfile