name: deploy to server # this will deploy the safe and secure tested app to production server

on:
    workflow_call:

jobs:
    deploy:
        env:
            DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
            DoCKER_TAG: ${{ github.event.worflow_run.head_sha}}
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: set docker_tag env variable
              run: echo "DOCKER_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

            
            - name: ssh to prod server
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.ec2_HOST }}
                username: ${{ secrets.ec2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    echo "starting deployment"
                    mkdir -p devops

            - name: copy the docker compose file
              uses: appleboy/scp-action@v0.1.3
              with:
                host: ${{ secrets.ec2_HOST }}
                username: ${{ secrets.ec2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                source: docker-compose.yml 
                target: ~/devops

            - name: ssh to prod server and run the app
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.ec2_HOST }}
                username: ${{ secrets.ec2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    echo "Running app"
                    sudo apt update && sudo apt upgrade -y
                    sudo apt-get install docker.io -y
                    sudo systemctl start docker
                    sudo systemctl enable docker
                    sudo usermod -aG docker $USER && newgrp docker
                    sudo mkdir -p /usr/local/lib/docker/cli-plugins
                    sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                    -o /usr/local/lib/docker/cli-plugins/docker-compose
                    sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                    sudo docker --version
                    sudo docker compose version
                    
                    cd ~/devops   # 🔥 MOVE FIRST

                    # Create .env INSIDE devops folder
                    echo "DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}" > .env
                    echo "DOCKER_TAG=${{ github.sha }}" >> .env
                    # Debug (optional but helpful)
                    cat .env

                    # Login
                    echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login \
                    --username "${{ vars.DOCKERHUB_USERNAME }}" \
                    --password-stdin
                    cd ~/devops && sudo docker compose up -d --build --force-recreate --pull always