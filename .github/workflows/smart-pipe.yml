name: smart

on:
  push:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run linter
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: echo "Testing......."

  summary:
    runs-on: ubuntu-latest
    needs: [lint-test, test]
    steps:
      - name: Print branch & commit
        run: |
          echo "branch name: ${{ github.ref_name }}"
          echo "commit message: ${{ github.event.commits[0].message }}"

          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "This is a push to the MAIN branch"
          else
            echo "This is a push to a FEATURE branch"
          fi