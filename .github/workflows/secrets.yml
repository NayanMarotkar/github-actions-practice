name: secrets

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: check if secrets is set
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "Secret is set"
          else
            echo "Secret is not set"
          fi

      - name: print secret
        run: |
          echo "Secret message is: ${{ secrets.MY_SECRET_MESSAGE }}"